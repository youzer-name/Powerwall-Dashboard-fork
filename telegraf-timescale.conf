# Telegraf configuration: Powerwall Dashboard -> TimescaleDB (PostgreSQL)
#
# This is a second, independent Telegraf instance that duplicates the same
# pypowerwall polling the stock telegraf.conf does, but writes to TimescaleDB
# instead of InfluxDB -- see telegraf.conf for the full annotated reference /
# every other available Telegraf plugin (that file's boilerplate is omitted
# here to keep this one easy to read).
#
# Weather data is NOT polled here -- weather411 writes directly into
# pw_weather_log itself (see weather/server.py's TimescaleDB writer and
# weather411.conf's [TimescaleDB] section, toggled independently by setup.sh).
# See timescaledb/README.md for the full pipeline write-up.
#
# ${POSTGRES_USER}/${POSTGRES_PASSWORD}/${POSTGRES_DB}/${TZ} come from
# timescaledb.env (env_file on the telegraf-timescale service).

[agent]
  interval = "5s"
  round_interval = true
  metric_batch_size = 360
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = ""
  omit_hostname = false


###############################################################################
#                            OUTPUT PLUGINS                                   #
###############################################################################

[[outputs.postgresql]]
	connection = "host=timescaledb port=5432 user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB} sslmode=disable"
	schema = "public"
	tags_as_foreign_keys = false
	# Raw tables (http, alerts) don't exist yet on a fresh install -- Telegraf
	# creates them on first write. This template makes that first creation a
	# hypertable immediately, instead of a plain table needing a separate
	# conversion step (timescaledb/aggregate/bootstrap_raw_tables.sql still
	# runs periodically too, to add the retention policy and as a defensive
	# fallback -- see that file's header comment).
	create_templates = [
		'''CREATE TABLE {{ .table }} ({{ .allColumns }})''',
		'''SELECT create_hypertable({{ .table|quoteLiteral }}, 'time', chunk_time_interval => INTERVAL '1 day')''',
	]


###############################################################################
#                            INPUT PLUGINS                                    #
###############################################################################

[[inputs.http]]
	urls = [
		"http://pypowerwall:8675/aggregates",
		"http://pypowerwall:8675/soe",
		"http://pypowerwall:8675/strings",
		"http://pypowerwall:8675/temps/pw",
		"http://pypowerwall:8675/freq",
		"http://pypowerwall:8675/pod",
		"http://pypowerwall:8675/fans/pw"
	]
	method = "GET"
	insecure_skip_verify = true
	timeout = "4s"
	data_format = "json"

[[processors.date]]
	tag_key = "month"
	date_format = "Jan"
	timezone = "${TZ}"

[[processors.date]]
	tag_key = "year"
	date_format = "2006"
	timezone = "${TZ}"

# Alert Data
[[inputs.http]]
	urls = [
		"http://pypowerwall:8675/alerts/pw"
	]
	name_override = "alerts"
	method = "GET"
	insecure_skip_verify = true
	timeout = "4s"
	data_format = "json"

# Version info for the "Powerwall Dashboard" stat panel -- same ver.sh used
# by the stock telegraf.conf, mounted read-only into this container too (see
# powerwall.yml). Written to its own lazily-created "powerwall_dashboard"
# table (hypertabled/retained by bootstrap_raw_tables.sql, same as http/alerts).
[[inputs.exec]]
	commands = ["/etc/telegraf/ver.sh"]
	name_override = "powerwall_dashboard"
	data_format = "influx"
