services:
    influxdb:
        image: influxdb:1.8
        container_name: influxdb
        hostname: influxdb
        restart: unless-stopped
        profiles: ["influxdb"]
        ulimits:
            nofile:
                soft: 65536
                hard: 65536
        volumes:
            - type: bind
              source: ./influxdb.conf
              target: /etc/influxdb/influxdb.conf
              read_only: true
            - type: bind
              source: ./influxdb
              target: /var/lib/influxdb
        ports:
            - "${INFLUXDB_PORTS:-8086:8086}"
        env_file:
            - influxdb.env
        healthcheck:
            test: curl -f http://influxdb:8086/health || exit 1
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s

    pypowerwall:
        image: jasonacox/pypowerwall:0.15.13t94
        container_name: pypowerwall
        hostname: pypowerwall
        restart: unless-stopped
        volumes:
            - type: bind
              source: .auth
              target: /app/.auth
        user: "${PWD_USER:-1000:1000}"
        ports:
            - "${PYPOWERWALL_PORTS:-8675:8675}"
        environment:
            - PW_AUTH_PATH=.auth
        env_file:
            - pypowerwall.env
        healthcheck:
            test: curl -sf http://pypowerwall:8675/health > /dev/null || exit 1
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s

    telegraf:
        image: telegraf:1.28.2
        container_name: telegraf
        hostname: telegraf
        restart: unless-stopped
        profiles: ["influxdb"]
        user: "${PWD_USER:-1000:1000}"
        command: [
            "telegraf",
            "--config",
            "/etc/telegraf/telegraf.conf",
            "--config-directory",
            "/etc/telegraf/telegraf.d"
        ]
        volumes:
            - type: bind
              source: ./telegraf.conf
              target: /etc/telegraf/telegraf.conf
              read_only: true
            - type: bind
              source: ./telegraf.local
              target: /etc/telegraf/telegraf.d/local.conf
              read_only: true
            - type: bind
              source: ./VERSION
              target: /etc/telegraf/VERSION
              read_only: true
            - type: bind
              source: ./ver.sh
              target: /etc/telegraf/ver.sh
              read_only: true
        depends_on:
            - influxdb
            - pypowerwall
        healthcheck:
            test: pgrep telegraf || exit 1
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s

    grafana:
        image: grafana/grafana:12.3.1-ubuntu
        container_name: grafana
        hostname: grafana
        restart: unless-stopped
        ulimits:
            nofile:
                soft: 65536
                hard: 65536
        user: "${PWD_USER:-1000:1000}"
        volumes:
            - type: bind
              source: ./grafana
              target: /var/lib/grafana
        ports:
            - "${GRAFANA_PORTS:-9000:9000}"
        env_file:
            - grafana.env
            - timescaledb.env
        # "required: false" lets this resolve to a no-op when timescaledb isn't
        # in the active profile set (InfluxDB-only installs) instead of Compose
        # erroring over a dependency on a service that doesn't exist in this
        # run. When it *is* active, this blocks Grafana's startup -- and so its
        # first connection attempt -- until TimescaleDB's pg_isready healthcheck
        # passes. Without it, Grafana starts in parallel with TimescaleDB, its
        # postgres datasource plugin's first connection attempt can land before
        # Postgres is accepting connections, and that failure sticks (dashboards
        # show "you do not currently have a default database configured for
        # this data source" until someone manually hits Save & Test on the
        # datasource) rather than clearing on its own.
        depends_on:
            timescaledb:
                condition: service_healthy
                required: false
        healthcheck:
            test: curl -f http://grafana:"${GF_SERVER_HTTP_PORT:-9000}"/api/health || exit 1
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s

    weather411:
        build: ./weather
        image: weather411-timescaledb:local
        pull_policy: build
        container_name: weather411
        hostname: weather411
        restart: unless-stopped
        user: "${PWD_USER:-1000:1000}"
        volumes:
            - type: bind
              source: ./weather
              target: /var/lib/weather
              read_only: true
        ports:
            - "${WEATHER411_PORTS:-8676:8676}"
        environment:
            - WEATHERCONF=/var/lib/weather/weather411.conf
        healthcheck:
            test: wget --spider -q http://weather411:8676/stats || exit 1
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s

    timescaledb:
        image: timescale/timescaledb:latest-pg16
        container_name: timescaledb
        hostname: timescaledb
        restart: unless-stopped
        profiles: ["timescaledb"]
        volumes:
            - type: bind
              source: ./timescaledb/data
              target: /var/lib/postgresql/data
        ports:
            - "${TIMESCALEDB_PORTS:-127.0.0.1:5432:5432}"
        env_file:
            - timescaledb.env
        healthcheck:
            test: pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" || exit 1
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s

    telegraf-timescale:
        image: telegraf:1.28.2
        container_name: telegraf-timescale
        hostname: telegraf-timescale
        restart: unless-stopped
        profiles: ["timescaledb"]
        user: "${PWD_USER:-1000:1000}"
        command: [
            "telegraf",
            "--config",
            "/etc/telegraf/telegraf.conf"
        ]
        volumes:
            - type: bind
              source: ./telegraf-timescale.conf
              target: /etc/telegraf/telegraf.conf
              read_only: true
            - type: bind
              source: ./VERSION
              target: /etc/telegraf/VERSION
              read_only: true
            - type: bind
              source: ./ver.sh
              target: /etc/telegraf/ver.sh
              read_only: true
        env_file:
            - timescaledb.env
        depends_on:
            - timescaledb
            - pypowerwall
        healthcheck:
            test: pgrep telegraf || exit 1
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s

    aggregate-cron:
        image: postgres:16-alpine
        container_name: aggregate-cron
        hostname: aggregate-cron
        restart: unless-stopped
        profiles: ["timescaledb"]
        entrypoint: ["/bin/sh", "/timescaledb/cron-entrypoint.sh"]
        volumes:
            - type: bind
              source: ./timescaledb
              target: /timescaledb
              read_only: true
        env_file:
            - timescaledb.env
        depends_on:
            - timescaledb
